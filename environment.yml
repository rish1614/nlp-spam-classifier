# environment.yml

name: nlp-spam-env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  
  # Core Data & ML (from conda-forge for latest stable versions)
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scikit-learn>=1.2.0
  
  # Classical NLP
  - nltk>=3.8.1
  - gensim>=4.3.0
  
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # Web & Deployment
  - streamlit>=1.25.0
  - flask>=2.3.0
  - gunicorn>=21.2.0
  
  # Testing
  - pytest>=7.3.0
  
  # Deep Learning Core
  - pytorch
  
  # pip fallback for HuggingFace (often better managed via pip even inside Conda)
  - pip
  - pip:
      - transformers>=4.30.0
      - datasets>=2.12.0
